<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevQuote Project Estimator | Divine Emmanuel</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --gold: #d4af37;
      --dark: #0d0d0d;
      --dark-lighter: #1a1a1a;
      --text: #f5f5f5;
      --text-muted: #a0a0a0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--dark);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1.6;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
      border-bottom: 1px solid rgba(211, 175, 55, 0.2);
      padding-bottom: 30px;
    }

    h1 {
      color: var(--gold);
      font-size: 2.8rem;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--text-muted);
      font-style: italic;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 50px;
    }

    @media (max-width: 850px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 25px;
      border-left: 4px solid var(--gold);
      padding-left: 15px;
    }

    .features-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .feature-card {
      background-color: #111;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .feature-card:hover {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .feature-card.selected {
      background-color: var(--dark-lighter);
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
    }

    .feature-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .feature-name {
      font-weight: bold;
      font-size: 1.15rem;
    }

    .feature-hours {
      color: var(--gold);
      font-size: 0.9rem;
    }

    .feature-desc {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .quote-sidebar {
      position: sticky;
      top: 40px;
      background-color: #181818;
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 15px;
      padding: 35px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .quote-title {
      text-align: center;
      color: var(--gold);
      font-size: 1.6rem;
      margin-bottom: 30px;
    }

    .quote-row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 0;
      font-size: 0.95rem;
    }

    .row-label {
      color: var(--text-muted);
    }

    .row-value {
      color: var(--text);
    }

    .total-row {
      font-size: 1.25rem;
      font-weight: bold;
      border-bottom: none;
      margin-bottom: 25px;
    }

    .total-hours {
      color: var(--gold);
    }

    .price-display {
      background-color: var(--dark);
      border: 1px solid rgba(212, 175, 55, 0.1);
      border-radius: 8px;
      padding: 25px;
      text-align: center;
      margin-bottom: 30px;
    }

    .price-label {
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .price-value {
      font-size: 3rem;
      font-weight: bold;
      letter-spacing: -1px;
    }

    .export-btn {
      width: 100%;
      background-color: var(--gold);
      color: var(--dark);
      border: none;
      border-radius: 8px;
      padding: 16px;
      font-weight: 900;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
    }

    .export-btn:hover {
      background-color: #f0cb57;
      transform: translateY(-2px);
    }

    .export-btn:active {
      transform: translateY(0);
    }

    .disclaimer {
      text-align: center;
      font-size: 0.7rem;
      color: #555;
      margin-top: 20px;
      font-style: italic;
    }

    footer {
      text-align: center;
      margin-top: 80px;
    }

    .back-link {
      color: var(--gold);
      text-decoration: none;
      font-size: 0.9rem;
      transition: 0.2s;
    }

    .back-link:hover {
      text-decoration: underline;
    }
      header { animation: slideDown 0.8s ease forwards; } @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } } .hero-text { animation: fadeInRight 1s ease 0.2s both; } .hero-card { animation: fadeInLeft 1s ease 0.4s both; } @keyframes fadeInRight { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } } @keyframes fadeInLeft { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>DevQuote Estimator</h1>
      <p class="subtitle">Personalized technical scoping for your next high-performance SaaS project.</p>
    </header>

    <div class="main-grid">
      <section>
        <h2>Select Architecture</h2>
        <div class="features-list" id="featuresList">
          <!-- Features injected here -->
        </div>
      </section>

      <aside>
        <div class="quote-sidebar">
          <h3 class="quote-title">Investment Summary</h3>
          <div class="quote-row">
            <span class="row-label">Consulting Rate</span>
            <span class="row-value">$120/hr</span>
          </div>
          <div class="quote-row">
            <span class="row-label">Selected Modules</span>
            <span class="row-value" id="selectedCount">0</span>
          </div>
          <div class="quote-row total-row">
            <span class="row-label">Total Estimate</span>
            <span class="row-value total-hours" id="totalHours">0 hrs</span>
          </div>

          <div class="price-display">
            <div class="price-label">Project Valuation</div>
            <div class="price-value" id="totalCost">$0</div>
          </div>

          <button class="export-btn" onclick="exportPDF()">Export Technical Proposal</button>
          <p class="disclaimer">*Final roadmap subject to architectural audit.</p>
        </div>
      </aside>
    </div>

    <footer>
      <a href="../index.html" class="back-link">← Return to Portfolio</a>
    </footer>
  </div>

  <script>
    const FEATURES = [
      { id: 'auth', name: 'User Authentication', hours: 10, description: 'Secure login/signup with provider support (Google/OAuth)' },
      { id: 'stripe', name: 'Payment Integration', hours: 15, description: 'Checkout, subscriptions, and invoicing via Stripe' },
      { id: 'cms', name: 'Custom CMS Content', hours: 12, description: 'Content management, dynamic blogs, and SEO pages' },
      { id: 'realtime', name: 'Real-time Features', hours: 20, description: 'Websockets, chat, or live automotive/property updates' },
      { id: 'dashboard', name: 'Admin Dashboard', hours: 14, description: 'Rich metrics and management portal with Chart.js' },
      { id: 'email', name: 'Automated Workflows', hours: 8, description: 'Email notifications and lead tracking systems' }
    ];

    const HOURLY_RATE = 120;
    let selectedIds = new Set();

    function init() {
      const listEl = document.getElementById('featuresList');
      FEATURES.forEach(f => {
        const div = document.createElement('div');
        div.className = 'feature-card';
        div.id = `card-${f.id}`;
        div.onclick = () => toggleFeature(f.id);
        div.innerHTML = `
          <div class="feature-header">
            <span class="feature-name">${f.name}</span>
            <span class="feature-hours">~${f.hours} hrs</span>
          </div>
          <div class="feature-desc">${f.description}</div>
        `;
        listEl.appendChild(div);
      });
      updateUI();
    }

    function toggleFeature(id) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
        document.getElementById(`card-${id}`).classList.remove('selected');
      } else {
        selectedIds.add(id);
        document.getElementById(`card-${id}`).classList.add('selected');
      }
      updateUI();
    }

    function updateUI() {
      let totalHours = 0;
      selectedIds.forEach(id => {
        const f = FEATURES.find(feat => feat.id === id);
        if (f) totalHours += f.hours;
      });

      const totalCost = totalHours * HOURLY_RATE;
      
      document.getElementById('selectedCount').innerText = selectedIds.size;
      document.getElementById('totalHours').innerText = `${totalHours} hrs`;
      document.getElementById('totalCost').innerText = `$${totalCost.toLocaleString()}`;
    }

    function exportPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const date = new Date().toLocaleDateString();
      
      let totalHours = 0;
      const selectedFeatures = [];
      selectedIds.forEach(id => {
        const f = FEATURES.find(feat => feat.id === id);
        if (f) {
          totalHours += f.hours;
          selectedFeatures.push(f);
        }
      });
      const totalCost = totalHours * HOURLY_RATE;

      // Header Bar
      doc.setFillColor(13, 13, 13);
      doc.rect(0, 0, 210, 45, 'F');

      // Brand
      doc.setTextColor(212, 175, 55);
      doc.setFontSize(24);
      doc.text("Divine Emmanuel", 15, 25);
      doc.setFontSize(12);
      doc.text("Full-Stack Software Engineering Proposal", 15, 33);
      
      doc.setTextColor(150);
      doc.setFontSize(10);
      doc.text(`Proposal Date: ${date}`, 160, 25);

      // Body Section
      doc.setTextColor(20, 20, 20);
      doc.setFontSize(16);
      doc.text("Scope Assessment Summary", 15, 60);

      doc.setDrawColor(212, 175, 55);
      doc.setLineWidth(0.5);
      doc.line(15, 65, 195, 65);

      // Table Header
      doc.setFontSize(11);
      doc.setTextColor(100);
      doc.text("Technical Module", 15, 75);
      doc.text("Estimated Effort", 160, 75);
      doc.line(15, 78, 195, 78);

      // Rows
      let y = 88;
      doc.setTextColor(30);
      selectedFeatures.forEach(f => {
        doc.text(f.name, 15, y);
        doc.text(`~${f.hours} hrs`, 165, y);
        y += 10;
      });

      if (selectedFeatures.length === 0) {
        doc.text("No specific modules selected for this iteration.", 15, y);
        y += 10;
      }

      // Totals
      doc.line(15, y + 5, 195, y + 5);
      y += 18;
      doc.setFontSize(12);
      doc.text("Total Development Time:", 15, y);
      doc.text(`${totalHours} hrs`, 165, y);
      
      y += 12;
      doc.setFontSize(18);
      doc.setTextColor(212, 175, 55);
      doc.text("Estimated Investment:", 15, y);
      doc.text(`$${totalCost.toLocaleString()}`, 165, y);

      // Footer
      doc.setTextColor(160);
      doc.setFontSize(9);
      doc.text("* This estimate is for architectural planning and baseline development.", 15, 280);
      doc.text("Contact: divineemmanuel214@gmail.com | github.com/emmadrumz", 15, 286);

      doc.save(`Divine_Emmanuel_Estimate_${date.replace(/\//g,'-')}.pdf`);
    }

    init();
  </script>
</body>
</html>
