<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Book Instantly</title>
  <meta name="description" content="Pick a session, date, and time to request a booking. Payment can be enabled via Stripe Payment Links." />

  <style>
    :root { color-scheme: dark; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 15% 10%, rgba(212,175,55,0.14), transparent 60%),
                  radial-gradient(900px 500px at 90% 15%, rgba(255,255,255,0.06), transparent 55%),
                  #050505;
      color: rgba(255,255,255,0.92);
    }

    .wrap { max-width: 980px; margin: 0 auto; padding: 24px 16px 32px; }

    h1 { margin: 0; font-size: 1.35rem; letter-spacing: 0.4px; }
    .sub { margin: 6px 0 0; color: rgba(255,255,255,0.72); line-height: 1.4; max-width: 75ch; }

    .card {
      margin-top: 14px;
      border: 1px solid rgba(212,175,55,0.20);
      background: rgba(0,0,0,0.45);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.50);
    }

    form { padding: 16px; display: grid; gap: 12px; }

    .row { display: grid; gap: 12px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    @media (max-width: 720px) { .row { grid-template-columns: 1fr; } }

    label { font-weight: 800; color: rgba(255,255,255,0.88); font-size: 0.95rem; }

    input, select, textarea {
      width: 100%;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.92);
      outline: none;
      box-sizing: border-box;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(212,175,55,0.55);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.10);
    }

    textarea { min-height: 120px; resize: vertical; }

    .total {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(212,175,55,0.18);
      background: rgba(212,175,55,0.08);
      color: rgba(255,255,255,0.92);
      font-weight: 900;
    }

    .actions { display: flex; gap: 12px; flex-wrap: wrap; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 14px;
      border-radius: 999px;
      cursor: pointer;
      border: 1px solid rgba(212,175,55,0.55);
      background: rgba(212,175,55,0.14);
      color: #d4af37;
      font-weight: 900;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn.secondary {
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
    }

    .note {
      color: rgba(255,255,255,0.72);
      line-height: 1.45;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Book Instantly (Pick a Time)</h1>
    <p class="sub">Pick a session, date, and time. If you add Stripe Payment Links, this page can send the user to Stripe to pay. Otherwise, it will open a prefilled email request.</p>

    <div class="card">
      <form id="bookingForm" autocomplete="off">
        <div class="row">
          <div>
            <label for="sessionType">Session</label>
            <select id="sessionType" aria-label="Session">
              <option value="intro15">15-Minute Intro Call — $0</option>
              <option value="strategy30" selected>30-Minute Technical Strategy Session — $49.99 CAD</option>
              <option value="deep60">1-Hour Deep Technical Consultation — $100 CAD</option>
            </select>
          </div>
          <div>
            <label for="date">Preferred date</label>
            <input id="date" type="date" aria-label="Preferred date" required />
          </div>
        </div>

        <div class="row">
          <div>
            <label for="time">Preferred time</label>
            <select id="time" aria-label="Preferred time" required>
              <option value="09:00">09:00</option>
              <option value="10:00">10:00</option>
              <option value="11:00">11:00</option>
              <option value="13:00">13:00</option>
              <option value="14:00">14:00</option>
              <option value="15:00">15:00</option>
              <option value="16:00">16:00</option>
            </select>
          </div>
          <div>
            <label for="timezone">Timezone</label>
            <input id="timezone" type="text" aria-label="Timezone" readonly />
          </div>
        </div>

        <div class="row">
          <div>
            <label for="name">Name</label>
            <input id="name" type="text" placeholder="Your name" aria-label="Name" required />
          </div>
          <div>
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" aria-label="Email" required />
          </div>
        </div>

        <div>
          <label for="organization">Company / Project (optional)</label>
          <input id="organization" type="text" placeholder="Company or project name" aria-label="Company or project" />
        </div>

        <div>
          <label for="message">Notes (optional)</label>
          <textarea id="message" placeholder="What should we focus on during the session?" aria-label="Notes"></textarea>
        </div>

        <div class="total" id="totalCost">Session Price: $49.99 CAD</div>
        <div class="note" id="payNote"></div>

        <div class="actions">
          <button type="submit" class="btn" id="primaryBtn">Continue</button>
          <a class="btn secondary" href="request-consultation.html">Use email form instead</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    (() => {
      const CONSULTATION_EMAIL = 'Emmanuel@globalix-inc.com';

      // Paste Stripe Payment Links here when you create them.
      // Example: strategy30: 'https://buy.stripe.com/xxxx'
      const STRIPE_PAYMENT_LINKS = {
        intro15: '',
        strategy30: '',
        deep60: '',
      };

      const SESSIONS = {
        intro15: { key: 'intro15', productName: '15-Minute Intro Call', minutes: 15, priceCad: 0 },
        strategy30: { key: 'strategy30', productName: '30-Minute Technical Strategy Session', minutes: 30, priceCad: 49.99 },
        deep60: { key: 'deep60', productName: '1-Hour Deep Technical Consultation', minutes: 60, priceCad: 100 },
      };

      const form = document.getElementById('bookingForm');
      const sessionType = document.getElementById('sessionType');
      const dateInput = document.getElementById('date');
      const timeInput = document.getElementById('time');
      const tzInput = document.getElementById('timezone');
      const totalCost = document.getElementById('totalCost');
      const payNote = document.getElementById('payNote');
      const primaryBtn = document.getElementById('primaryBtn');

      function safeSessionKey(raw) {
        const k = String(raw || 'strategy30');
        return SESSIONS[k] ? k : 'strategy30';
      }

      function getSelectedSession() {
        return SESSIONS[safeSessionKey(sessionType?.value)];
      }

      function updateTotal() {
        const s = getSelectedSession();
        totalCost.textContent = `Session Price: $${s.priceCad} CAD`;

        const payLink = String(STRIPE_PAYMENT_LINKS[s.key] || '').trim();
        if (s.priceCad > 0 && payLink) {
          primaryBtn.textContent = `Pay $${s.priceCad} & Request Time`;
          payNote.textContent = 'You will be redirected to Stripe to complete payment.';
        } else if (s.priceCad > 0) {
          primaryBtn.textContent = 'Request Time (pay later)';
          payNote.textContent = 'Stripe payment link is not set yet; this will open an email request.';
        } else {
          primaryBtn.textContent = 'Request Time';
          payNote.textContent = 'This is a free intro call; this will open an email request.';
        }
      }

      function initFromQuery() {
        try {
          const key = new URLSearchParams(window.location.search).get('session');
          if (key) sessionType.value = safeSessionKey(key);
        } catch (e) {}
      }

      function initDateMin() {
        try {
          const today = new Date();
          const yyyy = today.getFullYear();
          const mm = String(today.getMonth() + 1).padStart(2, '0');
          const dd = String(today.getDate()).padStart(2, '0');
          const min = `${yyyy}-${mm}-${dd}`;
          dateInput.min = min;
          if (!dateInput.value) dateInput.value = min;
        } catch (e) {}
      }

      function initTimezone() {
        try {
          tzInput.value = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
        } catch (e) {
          tzInput.value = '';
        }
      }

      function gatherData() {
        const s = getSelectedSession();
        const preferredDate = String(dateInput.value || '').trim();
        const preferredTime = String(timeInput.value || '').trim();
        const preferredDateTime = preferredDate && preferredTime ? `${preferredDate} ${preferredTime}` : preferredDate;

        return {
          name: document.getElementById('name').value.trim(),
          email: document.getElementById('email').value.trim(),
          organization: document.getElementById('organization').value.trim(),
          date: preferredDateTime,
          timezone: String(tzInput.value || '').trim(),
          serviceType: 'Consultation',
          projectSize: 'N/A',
          sessionKey: s.key,
          sessionType: s.productName,
          minutes: s.minutes,
          total: s.priceCad,
          currency: 'CAD',
          message: document.getElementById('message').value.trim(),
        };
      }

      sessionType.addEventListener('change', updateTotal);
      initFromQuery();
      initDateMin();
      initTimezone();
      updateTotal();

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const data = gatherData();

        try { localStorage.setItem('pendingBooking', JSON.stringify(data)); } catch (err) {}

        const payLink = String(STRIPE_PAYMENT_LINKS[data.sessionKey] || '').trim();
        if (payLink && data.total > 0) {
          window.location.href = payLink;
          return;
        }

        const subject = `Session Booking Request — ${data.sessionType}`;
        const bodyLines = [
          `Name: ${data.name}`,
          `Email: ${data.email}`,
          `Organization/Project: ${data.organization || '-'}`,
          `Preferred date/time: ${data.date || '-'}`,
          `Timezone: ${data.timezone || '-'}`,
          `Session type: ${data.sessionType}`,
          `Duration: ${data.minutes} minute(s)` ,
          `Session price: $${data.total} ${data.currency}`,
          '',
          'Notes:',
          data.message || '-',
        ];

        const mailtoUrl = `mailto:${CONSULTATION_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyLines.join('\n'))}`;
        window.location.href = mailtoUrl;

        setTimeout(() => {
          window.location.href = 'booking-success.html';
        }, 500);
      });
    })();
  </script>
</body>
</html>
