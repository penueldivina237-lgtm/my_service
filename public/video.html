  <script>
    // Map hash keys to video sources. Replace with real YouTube IDs or local file paths.
    const videos = {
      video1: { type: 'youtube', src: 'https://www.youtube.com/embed/VIDEO_ID_1' },
      video2: { type: 'youtube', src: 'https://www.youtube.com/embed/VIDEO_ID_2' },
      video3: { type: 'youtube', src: 'https://www.youtube.com/embed/VIDEO_ID_3' },
      video4: { type: 'youtube', src: 'https://www.youtube.com/embed/VIDEO_ID_4' },
      video5: { type: 'youtube', src: 'https://www.youtube.com/embed/VIDEO_ID_5' },
      video6: { type: 'youtube', src: 'https://www.youtube.com/embed/VIDEO_ID_6' }
    };

    function showFallbackList() {
      const list = document.getElementById('videoList');
      list.style.display = '';
      list.innerHTML = Object.keys(videos).map(key => {
        return `<div class="video-card"><a href="video.html#${key}">${key}</a></div>`;
      }).join('');
    }

    function loadVideo(key) {
      const player = document.getElementById('playerArea');
      player.innerHTML = '';
      const v = videos[key];
      if (!v) { player.innerHTML = '<p>No video found for that id.</p>'; showFallbackList(); return; }

      if (v.type === 'youtube') {
        const iframe = document.createElement('iframe');
        iframe.src = v.src + '?rel=0&autoplay=1';
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        iframe.allowFullscreen = true;
        player.appendChild(iframe);
      } else if (v.type === 'mp4') {
        const vid = document.createElement('video');
        vid.src = v.src;
        vid.controls = true;
        vid.autoplay = true;
        player.appendChild(vid);
      }
    }

    // Choose video from hash (#video1) or query param (?v=video1)
    const hashKey = (location.hash || '').replace('#','');
    const params = new URLSearchParams(location.search);
    const qKey = params.get('v');
    const key = hashKey || qKey;

    if (key) {
      loadVideo(key);
    } else {
      document.getElementById('playerArea').innerHTML = '<p>Select a video from the gallery or choose one below.</p>';
      showFallbackList();
    }
  </script>

  <style>
    .chat-launcher-wrap { position: fixed; right: 18px; bottom: 18px; z-index: 5000; }

    .chat-launcher {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 4px solid rgba(255,255,255,0.10);
      background: rgba(212,175,55,0.16);
      color: #d4af37;
      box-shadow: 0 10px 30px rgba(0,0,0,0.40);
      transition: 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    .chat-launcher::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 999px;
      border: 1px solid rgba(212,175,55,0.35);
      opacity: 0.0;
      transform: scale(0.92);
      animation: chatPulse 1800ms ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes chatPulse {
      0% { opacity: 0.0; transform: scale(0.92); }
      35% { opacity: 0.55; transform: scale(1.02); }
      70% { opacity: 0.10; transform: scale(1.10); }
      100% { opacity: 0.0; transform: scale(0.92); }
    }

    .chat-launcher:hover { transform: scale(1.06) rotate(3deg); background: rgba(212,175,55,0.22); }

    .chat-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: flex-end;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      background: rgba(0,0,0,0.55);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }

    body.chat-open { overflow: hidden; }

    .chat-sheet [hidden] { display: none !important; }

    .chat-sheet {
      width: min(460px, 94vw);
      height: min(720px, calc(100dvh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom)));
      max-height: calc(100dvh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      overflow: hidden;
      position: relative;
      isolation: isolate;
      border-radius: 14px;
      border: 1px solid rgba(212, 175, 55, 0.20);
      background: rgba(0,0,0,0.55);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.55);
      transform: translateY(16px) scale(0.98);
      opacity: 0;
      transition: transform 300ms cubic-bezier(0.22, 1, 0.36, 1), opacity 220ms ease;
      will-change: transform, opacity;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .chat-sheet::after {
      content: '';
      position: absolute;
      inset: -46px;
      background:
        radial-gradient(420px 240px at 20% 15%, rgba(212,175,55,0.40), transparent 60%),
        radial-gradient(360px 220px at 85% 20%, rgba(37,211,102,0.22), transparent 62%),
        radial-gradient(520px 360px at 55% 85%, rgba(212,175,55,0.18), transparent 60%);
      filter: blur(26px);
      opacity: 0.70;
      transform: translate3d(0,0,0);
      animation: chatAurora 6.2s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    .chat-sheet > * { position: relative; z-index: 1; }

    @keyframes chatAurora {
      0% { transform: translate3d(-10px, 8px, 0) scale(1.02); opacity: 0.55; }
      45% { transform: translate3d(12px, -10px, 0) scale(1.06); opacity: 0.85; }
      100% { transform: translate3d(-10px, 8px, 0) scale(1.02); opacity: 0.55; }
    }

    .chat-overlay.is-open .chat-sheet { transform: translateY(0) scale(1); opacity: 1; }

    .chat-sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .chat-sheet-title {

    .wa-panel {
      height: 100%;
      display: grid;

    }

    .wa-header {
      display: flex;

    .wa-back {

    .wa-title { color: rgba(255,255,255,0.92); font-weight: 900; }

    .wa-body {

    .wa-note {

    .wa-form {

    @media (max-width: 480px) {

    @media (prefers-reduced-motion: reduce) {
      .chat-launcher, .chat-sheet { transition: none; }
      .chat-launcher::before { animation: none; }
      .chat-sheet::after { animation: none; }
      .chat-overlay { -webkit-backdrop-filter: none; backdrop-filter: none; }

    header { animation: slideDown 0.8s ease forwards; } @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } } .hero-text { animation: fadeInRight 1s ease 0.2s both; } .hero-card { animation: fadeInLeft 1s ease 0.4s both; } @keyframes fadeInRight { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } } @keyframes fadeInLeft { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

  <script>
    (function() {
      const launcher = document.getElementById('chatLauncher');
      const overlay = document.getElementById('chatOverlay');
      const closeBtn = document.getElementById('chatClose');

      const waPanel = document.getElementById('waPanel');
      const waBack = document.getElementById('waBack');
      const waForm = document.getElementById('waForm');
      const waInput = document.getElementById('waInput');

      const WA_NUMBER = '13653845983';

      let lastActiveEl = null;

      function openWhatsApp(prefill) {
        const defaultMsg = "Hi Divine, I visited your website and would like to discuss software, cybersecurity, and/or DevSecOps services. Could we schedule a consultation?";
        const msg = (prefill || '').trim() || defaultMsg;
        const url = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
        window.open(url, '_blank', 'noopener');
      }

      function showWhatsApp(prefill) {
        if (waPanel) waPanel.hidden = false;
        if (waInput && !String(waInput.value || '').trim()) {
          const defaultMsg = "Hi Divine, I visited your website and would like to discuss software, cybersecurity, and/or DevSecOps services. Could we schedule a consultation?";
          waInput.value = (prefill || '').trim() || defaultMsg;
        }
        setTimeout(() => {
          try { waInput && waInput.focus({ preventScroll: true }); } catch (e) {}
        }, 0);
      }

      function openOverlay() {
        if (!overlay) return;
        lastActiveEl = document.activeElement;
        overlay.style.display = 'flex';
        overlay.setAttribute('aria-hidden', 'false');
        document.body.classList.add('chat-open');
        requestAnimationFrame(() => overlay.classList.add('is-open'));
        showWhatsApp();
      }

      function closeOverlay() {
        if (!overlay) return;
        overlay.classList.remove('is-open');
        overlay.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('chat-open');
        setTimeout(() => {
          overlay.style.display = 'none';
          if (waPanel) waPanel.hidden = true;
          try { lastActiveEl && lastActiveEl.focus && lastActiveEl.focus(); } catch (e) {}
        }, 180);
      }

      launcher && launcher.addEventListener('click', openOverlay);
      closeBtn && closeBtn.addEventListener('click', closeOverlay);
      waBack && waBack.addEventListener('click', closeOverlay);

      overlay && overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeOverlay();
      });

      document.addEventListener('keydown', (e) => {
        if (!overlay) return;
        if (overlay.getAttribute('aria-hidden') === 'true') return;
        if (e.key === 'Escape') closeOverlay();
      });

      waForm && waForm.addEventListener('submit', (e) => {
        e.preventDefault();
        openWhatsApp(waInput ? waInput.value : '');
        closeOverlay();
      });
    })();
  </script>

  <script>
    (function(){
      function loadAnalytics() {
        if (window._analyticsLoaded) return;
        window._analyticsLoaded = true;
        const id = 'G-XXXXXXXXXX';
        const s = document.createElement('script');
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
        s.async = true; document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);} window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', id, { anonymize_ip: true });
      }

      const consent = localStorage.getItem('analyticsConsent');
      const banner = document.getElementById('cookieConsent');
      if (consent === 'granted') { loadAnalytics(); }
      else if (consent === 'declined') { /* do nothing */ }
      else { banner.style.display = 'flex'; }

      document.getElementById('acceptAnalytics')?.addEventListener('click', function(){
        localStorage.setItem('analyticsConsent','granted'); loadAnalytics(); banner.style.display = 'none';
      });

      document.getElementById('declineAnalytics')?.addEventListener('click', function(){
        localStorage.setItem('analyticsConsent','declined'); banner.style.display = 'none';
      });
    })();
